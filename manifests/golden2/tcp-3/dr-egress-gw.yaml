apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: egressgateway
  namespace: istio-egress
spec:
  host: istio-egressgateway.istio-egress.svc.cluster.local
  subsets:
  - name: httpbin-eg-http
    trafficPolicy:
      portLevelSettings:
      - port: 
          number: 80
        tls:
          mode: ISTIO_MUTUAL
          sni: www.httpbin.org
  - name: httpbin-eg
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL 
        sni: www.httpbin.org
  - name: cnn-eg
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: www.cnn.com
  - name: google-eg
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: www.google.com
  - name: mysql-a-tls
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: mysql-a.omegaworld.net
  - name: mysql-1-tls
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: omega-mysql-1.omegaworld.net
  - name: tcp-test-01-tls
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: tcp-test-01.omegaworld.net
  - name: tcp-test-02-tls
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: tcp-test-02.omegaworld.net
  - name: tcp-test-03-tls
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: tcp-test-03.omegaworld.net
  - name: omegaapp2-eg
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        sni: omegaapp-2.omegaworld.net
