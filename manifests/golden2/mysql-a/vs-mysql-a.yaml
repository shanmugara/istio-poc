apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: mysql-a
  namespace: istio-egress
spec:
  hosts:
  - mysql-a.omegaworld.net
  gateways:
  - egress-mysql-a
  - mesh
  tcp:
  - match:
    - gateways:
      - mesh
      port: 3306
    route:
    - destination:
        host: istio-egressgateway.istio-egress.svc.cluster.local
        port:
          number: 443
        subset: mysql-a-tls
      weight: 100
  - match:
    - gateways:
      - egress-mysql-a
      port: 443
    route:
    - destination:
        host: mysql-a.omegaworld.net
        port:
          number: 3306
        subset: mysql-a-tcp
      weight: 100
