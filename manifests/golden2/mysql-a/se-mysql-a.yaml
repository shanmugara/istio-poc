apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: mysql-a
  namespace: istio-egress
spec:
  hosts:
  - mysql-a.omegaworld.net
  endpoints:
  - address: 192.168.0.145
  addresses:
  - 192.168.0.145/32
  ports:
  - number: 3306
    name: tcp-port-mesh
    protocol: TCP
  - number: 443
    name: tls-port-egress
    protocol: TLS
  resolution: STATIC
  location: MESH_EXTERNAL
